[workspace]
members = [
  # Bogo test shim
  "bogo",
  # CI benchmarks
  "ci-bench",
  # Network-based tests
  "connect-tests",
  # tests and example code
  "examples",
  # Tests that require OpenSSL
  "openssl-tests",
  # example of custom provider
  "provider-example",
  # the main library and tests
  "rustls",
  # rustls cryptography provider integration tests
  "rustls-provider-test",
]
exclude = [
  # experimental post-quantum algorithm support
  "rustls-post-quantum",
]
default-members = [
  "examples",
  "rustls",
]
resolver = "2"

[profile.bench]
codegen-units = 1
lto = true
